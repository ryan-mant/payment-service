spring:
  threads:
    virtual:
      enabled: true
  application:
    name: core-banking-service
  datasource:
    url: jdbc:postgresql://localhost:5432/db_core_banking
    username: postgres
    password: root@123

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
