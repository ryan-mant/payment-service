spring:
  threads:
    virtual:
      enabled: true
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 500
            readTimeout: 1000
          authorizer-client:
            connectTimeout: 300
            readTimeout: 800
  application:
    name: core-banking-service
  datasource:
    url: jdbc:postgresql://localhost:5444/db_core_banking
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
app:
  client:
    authorizer:
#      url: "http://localhost:9999/fake-authorizer" esse aqui é só pra testar os graficos do circuit breaker no grafana
      url: "http://localhost:8080/fake-authorizer"

resilience4j:
  circuitbreaker:
    instances:
      authorizer:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 700ms
        eventConsumerBufferSize: 10
  timelimiter:
    instances:
      authorizer:
        timeoutDuration: 850ms
        cancelRunningFuture: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}